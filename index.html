<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゆる会話</title>
<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  text-align: center;
  padding: 20px;
}

.character {
  display: inline-block;
  margin: 10px;
  cursor: pointer;
}

.character img {
  width: 100px;
  height: 100px;
  border-radius: 15px;
  object-fit: cover;
  border: 2px solid #444;
}

#log {
  margin-top: 20px;
  padding: 15px;
  background: #222;
  border-radius: 10px;
  min-height: 80px;
}
</style>
</head>
<body>

<h2>ゆる会話</h2>

<div class="character" onclick="talk('五条っぽい人')">
  <img src="無題325_20260417075901.png">
  <div>朝倉シンっぽい人</div>
</div>

<div class="character" onclick="talk('落ち着いた人')">
  <img src="無題325_20260417075955.png">
  <div>大佛っぽい人</div>
</div>

<div class="character" onclick="talk('気まぐれな人')">
  <img src="無題325_20260417080024.png">
  <div>神々廻っぽい人</div>
</div>

  <div class="character" onclick="talk('気まぐれな人')">
  <img src="無題325_20260417080113.png">
  <div>南雲与市っぽい人</div>
</div>

  <div class="character" onclick="talk('気まぐれな人')">
  <img src="image5.jpg">
  <div>夏油傑っぽい人</div>
</div>

  <div class="character" onclick="talk('気まぐれな人')">
  <img src="image6.jpg">
  <div>五条悟っぽい人</div>
</div>


<div id="log">ここに会話が出る</div>

<script>
const replies = {
  "シン": [
    "お、今日も来てくれたんだな",
    "今日はどうだった？",
    "ちゃんと休んでるか？"
  ],
  "大佛": [
    "……ここ、落ち着くね",
    "なんか眠くなってきた…",
    "無理しなくていいよ…"
  ],
  "神々廻": [
    "はぁ…まぁええけど",
    "ちゃんと飯食べてるか？",
    "ええやん"
  ],
  "南雲": [
    "暇なの？いいね〜",
    "今日は何するの？",
    "まぁ適当でいいでしょ〜"
  ],
  "夏油": [
    "どうしたんだい",
    "無理はしないでね",
    "今日はどうだった？"
  ],
  "五条": [
    "お、来たじゃん",
    "退屈してた？",
    "まぁ座りなよ"
  ]
};
  
function talk(name){
  const list = replies[name];
  const msg = list[Math.floor(Math.random()*list.length)];
  document.getElementById("log").innerText = name + "：「" + msg + "」";
}
</script>

</body>
</html>
